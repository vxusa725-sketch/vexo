<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Ultimate Source Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* HyperOS Design System Tokens */
        :root {
            --hyper-bezier: cubic-bezier(0.32, 0.72, 0, 1);
            --snap-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --bg-blur: saturate(180%) blur(20px);
        }

        body {
            background: #050505;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'MiSans', 'Inter', system-ui;
            overflow: hidden;
            touch-action: none;
        }

        /* Phone Chassis */
        .device {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 55px;
            border: 12px solid #222;
            position: relative;
            box-shadow: 0 0 0 4px #333, 0 50px 100px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Wallpapers with Layering */
        .wallpaper {
            position: absolute;
            inset: 0;
            background: url('https://w0.peakpx.com/wallpaper/705/185/HD-wallpaper-hyper-os-xiaomi.jpg') center/cover;
            transition: transform 0.8s var(--hyper-bezier), filter 0.8s var(--hyper-bezier);
            z-index: 1;
        }

        /* Status Bar Fix */
        .status-bar {
            height: 44px;
            width: 100%;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            z-index: 100;
            position: absolute;
        }

        /* HyperOS Icons Engine */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            padding: 30px;
            margin-top: 60px;
            z-index: 10;
            position: relative;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s var(--hyper-bezier);
        }

        .icon-wrapper:active { transform: scale(0.88) !important; }

        .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 17px; /* Xiaomi Perfect Curvature */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* App Window - Real HyperOS Physics */
        .app-layer {
            position: absolute;
            inset: 0;
            background: #f4f4f7;
            z-index: 200;
            border-radius: 40px;
            transform: translateY(100%) scale(0.9);
            opacity: 0;
            transition: transform 0.6s var(--hyper-bezier), opacity 0.4s var(--hyper-bezier), border-radius 0.6s var(--hyper-bezier);
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .app-layer.active {
            transform: translateY(0) scale(1);
            opacity: 1;
            border-radius: 0px;
            pointer-events: auto;
        }

        /* Mock Content Skeleton */
        .skeleton-loader {
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 6px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Home Indicator - The Core of Gestures */
        .home-handle {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
            z-index: 300;
            transition: background 0.3s;
        }

        /* HyperOS Dock */
        .dock {
            position: absolute;
            bottom: 25px;
            left: 15px;
            right: 15px;
            height: 85px;
            background: rgba(255,255,255,0.22);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            z-index: 50;
            transition: transform 0.5s var(--hyper-bezier);
        }

    </style>
</head>
<body>

<div class="device">
    <div class="wallpaper" id="wp"></div>
    
    <div class="status-bar">
        <span>00:00</span>
        <div class="flex gap-1">📶 5G 🔋</div>
    </div>

    <div class="icon-grid" id="main-grid">
        </div>

    <div class="app-layer" id="app-window">
        <div class="p-10 pt-16 flex-1 space-y-6 bg-white">
            <div class="flex items-center gap-4 mb-8">
                <div id="target-icon" class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg"></div>
                <div>
                    <h1 id="target-name" class="text-2xl font-bold">App</h1>
                    <p class="text-gray-400 text-sm">نظام HyperOS التجريبي</p>
                </div>
            </div>
            <div class="skeleton-loader w-full"></div>
            <div class="skeleton-loader w-3/4"></div>
            <div class="skeleton-loader w-full"></div>
            <div class="h-40 bg-gray-50 rounded-3xl border border-gray-100 flex items-center justify-center text-gray-400">
                محتوى المحاكاة الذكي
            </div>
        </div>
        <div class="home-handle" id="home-trigger"></div>
    </div>

    <div class="dock" id="main-dock">
        <div class="app-icon bg-green-500 text-white" onclick="openApp('الهاتف', '📞', 'bg-green-500')">📞</div>
        <div class="app-icon bg-blue-500 text-white" onclick="openApp('المتصفح', '🌐', 'bg-blue-500')">🌐</div>
        <div class="app-icon bg-zinc-800 text-white" onclick="openApp('الكاميرا', '📷', 'bg-zinc-800')">📷</div>
    </div>
</div>

<script>
    const appList = [
        { name: 'الإعدادات', icon: '⚙️', color: 'bg-zinc-400' },
        { name: 'الملفات', icon: '📂', color: 'bg-yellow-500' },
        { name: 'الموسيقى', icon: '🎵', color: 'bg-red-500' },
        { name: 'الطقس', icon: '☁️', color: 'bg-blue-300' },
        { name: 'الملاحظات', icon: '📝', color: 'bg-orange-400' },
        { name: 'الحماية', icon: '🛡️', color: 'bg-green-600' },
        { name: 'المعرض', icon: '🖼️', color: 'bg-white' },
        { name: 'الساعة', icon: '⏰', color: 'bg-zinc-100' }
    ];

    const grid = document.getElementById('main-grid');
    const appWindow = document.getElementById('app-window');
    const wp = document.getElementById('wp');
    const dock = document.getElementById('main-dock');

    // Build Desktop
    appList.forEach(app => {
        const wrap = document.createElement('div');
        wrap.className = 'icon-wrapper';
        wrap.onclick = () => openApp(app.name, app.icon, app.color);
        wrap.innerHTML = `
            <div class="app-icon ${app.color} text-white shadow-xl">${app.icon}</div>
            <span class="text-white text-[11px] font-medium">${app.name}</span>
        `;
        grid.appendChild(wrap);
    });

    function openApp(name, icon, color) {
        document.getElementById('target-name').innerText = name;
        const targetIcon = document.getElementById('target-icon');
        targetIcon.innerText = icon;
        targetIcon.className = `w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg ${color} text-white`;

        appWindow.classList.add('active');
        wp.style.transform = 'scale(1.1)';
        wp.style.filter = 'blur(20px) brightness(0.7)';
        dock.style.transform = 'translateY(150px)';
        grid.style.transform = 'scale(0.95)';
        grid.style.opacity = '0';
    }

    // Gesture Engine (Physics Based)
    let startY = 0;
    let currentY = 0;
    const handle = document.getElementById('home-trigger');

    handle.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        appWindow.style.transition = 'none';
    });

    handle.addEventListener('touchmove', (e) => {
        currentY = e.touches[0].clientY - startY;
        if (currentY > 0) {
            const scale = 1 - (currentY / 2000);
            appWindow.style.transform = `translateY(${currentY}px) scale(${scale})`;
            appWindow.style.borderRadius = `${(currentY / 10) + 0}px`;
        }
    });

    handle.addEventListener('touchend', (e) => {
        appWindow.style.transition = 'transform 0.5s var(--hyper-bezier), opacity 0.3s, border-radius 0.5s';
        if (currentY > 120) {
            closeApp();
        } else {
            appWindow.style.transform = 'translateY(0) scale(1)';
            appWindow.style.borderRadius = '0px';
        }
        currentY = 0;
    });

    function closeApp() {
        appWindow.classList.remove('active');
        appWindow.style.transform = 'translateY(100%) scale(0.9)';
        wp.style.transform = 'scale(1)';
        wp.style.filter = 'blur(0px) brightness(1)';
        dock.style.transform = 'translateY(0)';
        grid.style.transform = 'scale(1)';
        grid.style.opacity = '1';
    }
</script>

</body>
</html>
