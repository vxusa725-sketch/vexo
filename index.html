<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Elite Test</title>
    <style>
        :root {
            --hyper-ease: cubic-bezier(0.3, 0, 0, 1); /* محاكاة دقيقة لمحرك شاومي */
            --bg-url: url('https://w0.peakpx.com/wallpaper/705/185/HD-wallpaper-hyper-os-xiaomi.jpg');
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: var(--bg-url) center/cover no-repeat;
            font-family: sans-serif;
        }

        /* الطبقة الضبابية الخلفية */
        #blur-layer {
            position: fixed; inset: 0; 
            backdrop-filter: blur(0px);
            transition: backdrop-filter 0.5s var(--hyper-ease);
            z-index: 5; pointer-events: none;
        }

        .container {
            position: relative; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 50px;
        }

        .dock {
            align-self: center; background: rgba(255,255,255,0.25);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px; border-radius: 28px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .icon {
            width: 55px; height: 55px; border-radius: 14px;
            cursor: pointer; transition: transform 0.2s var(--hyper-ease);
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* حركة الضغط (Feedback) */
        .icon:active { transform: scale(0.85); }

        /* نافذة التطبيق "السائلة" */
        .app-view {
            position: fixed; 
            width: 100vw; height: 100vh;
            top: 0; left: 0;
            background: rgba(255,255,255,0.95);
            transform: scale(0.9) translateY(100%);
            opacity: 0; border-radius: 40px;
            transition: transform 0.5s var(--hyper-ease), opacity 0.4s var(--hyper-ease);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }

        .app-view.open {
            transform: scale(1) translateY(0);
            opacity: 1; border-radius: 0px;
        }

        .app-content { text-align: center; }
        .close-hint { color: #888; font-size: 14px; margin-top: 20px; }

        /* ألوان الأيقونات */
        .c-1 { background: #3b82f6; } /* Camera */
        .c-2 { background: #10b981; } /* Phone */
        .c-3 { background: #6366f1; } /* Settings */
    </style>
</head>
<body>

<div id="blur-layer"></div>

<div class="container">
    <div class="dock">
        <div class="icon c-1" onclick="launch('الكاميرا')">📷</div>
        <div class="icon c-2" onclick="launch('الهاتف')">📞</div>
        <div class="icon c-3" onclick="launch('الإعدادات')">⚙️</div>
    </div>
</div>

<div id="app" class="app-view" onclick="closeApp()">
    <div class="app-content">
        <h1 id="app-name">App</h1>
        <p>اختبار سلاسة الاستجابة المتتالية</p>
        <div class="close-hint">اضغط في أي مكان للإغلاق</div>
    </div>
</div>

<script>
    const app = document.getElementById('app');
    const blur = document.getElementById('blur-layer');
    const nameTxt = document.getElementById('app-name');

    function launch(name) {
        // ميزة الـ Interrupt: إغلاق فوري للقديم وفتح الجديد
        app.classList.remove('open');
        
        setTimeout(() => {
            nameTxt.innerText = name;
            app.classList.add('open');
            blur.style.backdropFilter = "blur(15px)";
        }, 10); // تأخير تقني 10ms فقط لضمان إعادة تشغيل الـ Animation
    }

    function closeApp() {
        app.classList.remove('open');
        blur.style.backdropFilter = "blur(0px)";
    }
</script>

</body>
</html>
