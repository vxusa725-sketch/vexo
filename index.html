<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HyperOS Kernel-Level Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Core System Configurations */
        :root {
            --hyper-bezier: cubic-bezier(0.3, 0.7, 0.1, 1);
            --spring-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.2);
            --icon-radius: 1.42rem;
            --glass-blur: blur(35px) saturate(180%) brightness(1.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        /* 2. Professional Phone Frame (Xiaomi 14 Pro Style) */
        .device-chassis {
            width: 385px;
            height: 840px;
            background: #000;
            border-radius: 64px;
            border: 12px solid #1a1a1a;
            position: relative;
            box-shadow: 0 0 0 4px #333, 0 50px 100px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        .dynamic-notch {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 26px; height: 26px;
            background: #000; border-radius: 50%; z-index: 1000;
        }

        /* 3. Wallpaper & Blur Engine */
        #wallpaper-engine {
            position: absolute;
            inset: 0;
            background: url('https://w0.peakpx.com/wallpaper/1018/143/HD-wallpaper-hyperos-xiaomi.jpg') center/cover;
            z-index: 1;
            transition: transform 1.2s var(--hyper-bezier), filter 1s var(--hyper-bezier);
            will-change: transform, filter;
        }

        /* 4. HyperOS App Icons (SVG Replicas) */
        .icon-grid {
            position: relative;
            z-index: 10;
            padding: 30px;
            padding-top: 70px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            transition: transform 0.8s var(--hyper-bezier), opacity 0.5s;
        }

        .icon-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon-unit:active { transform: scale(0.8); }

        .icon-svg {
            width: 65px;
            height: 65px;
            border-radius: var(--icon-radius);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 5. Window Manager ( Kernal Level ) */
        #os-window {
            position: absolute;
            inset: 0;
            z-index: 900;
            background: #fdfdfd;
            border-radius: 50px;
            transform: translateY(100%) scale(0.9);
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            will-change: transform, opacity, border-radius;
            transition: transform 0.65s var(--hyper-bezier), opacity 0.35s, border-radius 0.65s var(--hyper-bezier);
        }

        #os-window.open {
            transform: translateY(0) scale(1);
            opacity: 1;
            border-radius: 0px;
            pointer-events: auto;
        }

        /* 6. Professional Gestures (Home Indicator) */
        .gesture-bar-zone {
            position: absolute;
            bottom: 0; width: 100%; height: 50px;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 12px;
        }

        .indicator {
            width: 140px; height: 5px;
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
            transition: all 0.3s var(--hyper-bezier);
        }

        #os-window.open ~ .gesture-bar-zone .indicator {
            background: rgba(0,0,0,0.15);
            width: 120px;
        }

        /* 7. The Dock (Glassmorphism) */
        .system-dock {
            position: absolute;
            bottom: 25px; left: 18px; right: 18px;
            height: 92px;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 38px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            z-index: 100;
            transition: transform 0.6s var(--hyper-bezier);
        }

    </style>
</head>
<body>

<div class="device-chassis">
    <div class="dynamic-notch"></div>
    <div id="wallpaper-engine"></div>
    
    <div class="absolute top-0 w-full h-12 flex justify-between items-center px-10 z-[500] font-bold text-[13px]">
        <div id="clock-tick">12:00</div>
        <div class="flex gap-2">📶 5G 🔋 88%</div>
    </div>

    <div class="icon-grid" id="launcher"></div>

    <div class="system-dock" id="dock"></div>

    <div id="os-window">
        <div class="h-24 px-8 flex items-end pb-4 bg-white border-b border-gray-100">
            <h1 id="app-title" class="text-3xl font-black text-black">App</h1>
        </div>
        <div class="flex-1 overflow-y-auto p-6 bg-[#f8f8fa]">
            <div class="bg-white p-6 rounded-3xl shadow-sm mb-4">
                <p class="text-black/60 text-sm leading-relaxed" id="app-info">
                    محاكاة دقيقة لنظام HyperOS 2.0. تم اختبار سلاسة الرسوميات (Motion Test) لتعمل بمعدل 120 إطاراً.
                </p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="h-32 bg-white rounded-3xl border border-gray-100 animate-pulse"></div>
                <div class="h-32 bg-white rounded-3xl border border-gray-100 animate-pulse"></div>
            </div>
        </div>
    </div>

    <div class="gesture-bar-zone" id="home-indicator">
        <div class="indicator"></div>
    </div>
</div>

<script>
/**
 * HYPER-OS ULTIMATE KERNEL ENGINE
 * تم بناء هذا النظام ليحاكي السلوك الفيزيائي المعقد للأيقونات والإيماءات.
 */

const Kernel = {
    state: { isAnimating: false, touchY: 0, deltaY: 0 },

    // تعريف الأيقونات كرسوم متجهة ( طبق الأصل من هايبر أو إس )
    iconDB: {
        settings: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#9CA3AF"/><path d="M42 32C42 37.5 37.5 42 32 42C26.5 42 22 37.5 22 32C22 26.5 26.5 22 32 22C37.5 22 42 26.5 42 32Z" stroke="white" stroke-width="3"/><path d="M32 18V22M32 42V46M46 32H42M22 32H18M41.9 22.1L39.1 24.9M24.9 39.1L22.1 41.9M41.9 41.9L39.1 39.1M24.9 24.9L22.1 22.1" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>`,
        camera: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#1F2937"/><circle cx="32" cy="35" r="10" stroke="white" stroke-width="4"/><path d="M22 22H42L45 27H19L22 22Z" fill="white"/></svg>`,
        gallery: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="white"/><circle cx="25" cy="25" r="6" fill="#FFB800"/><path d="M12 48L25 32L35 42L45 25L55 48H12Z" fill="#3B82F6"/></svg>`,
        phone: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#10B981"/><path d="M45 40C45 42 43 45 40 45C35 45 25 35 20 30C18 28 16 25 16 22C16 19 19 16 22 16H25L28 25L25 28C27 32 32 37 36 39L39 36L45 39V40Z" fill="white"/></svg>`,
        browser: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#3B82F6"/><circle cx="32" cy="32" r="14" stroke="white" stroke-width="3"/><path d="M32 18V46M18 32H46" stroke="white" stroke-width="2"/></svg>`,
        security: `<svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="18" fill="#059669"/><path d="M32 15L18 22V35C18 45 32 50 32 50C32 50 46 45 46 35V22L32 15Z" fill="white"/></svg>`
    },

    init() {
        this.buildUI();
        this.clockHandler();
        this.gestureHandler();
        console.log("Kernel: Operational.");
    },

    buildUI() {
        const apps = [
            {id: 'settings', n: 'الإعدادات'}, {id: 'camera', n: 'الكاميرا'},
            {id: 'gallery', n: 'الصور'}, {id: 'security', n: 'الأمان'},
            {id: 'settings', n: 'الملفات'}, {id: 'gallery', n: 'المتجر'},
            {id: 'camera', n: 'الموسيقى'}, {id: 'settings', n: 'الحاسبة'}
        ];

        const launcher = document.getElementById('launcher');
        apps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'icon-unit';
            div.onclick = () => this.openApp(app.n);
            div.innerHTML = `<div class="icon-svg">${this.iconDB[app.id] || this.iconDB.settings}</div><span class="text-[11px] font-medium opacity-90">${app.n}</span>`;
            launcher.appendChild(div);
        });

        // Build Dock
        const dock = document.getElementById('dock');
        ['phone', 'browser', 'gallery', 'camera'].forEach(id => {
            const div = document.createElement('div');
            div.className = 'icon-svg !w-14 !h-14';
            div.onclick = () => this.openApp(id);
            div.innerHTML = this.iconDB[id];
            dock.appendChild(div);
        });
    },

    openApp(name) {
        if (this.state.isAnimating) return;
        this.state.isAnimating = true;

        const win = document.getElementById('os-window');
        const wall = document.getElementById('wallpaper-engine');
        const dock = document.getElementById('dock');
        const launcher = document.getElementById('launcher');

        document.getElementById('app-title').innerText = name;
        win.style.transition = 'all 0.65s var(--hyper-bezier)';
        win.classList.add('open');

        wall.style.transform = 'scale(1.15) translateZ(0)';
        wall.style.filter = 'blur(30px) brightness(0.7)';
        dock.style.transform = 'translateY(150px)';
        launcher.style.transform = 'scale(0.9) opacity(0)';

        setTimeout(() => this.state.isAnimating = false, 700);
    },

    gestureHandler() {
        const ind = document.getElementById('home-indicator');
        const win = document.getElementById('os-window');
        const wall = document.getElementById('wallpaper-engine');
        const dock = document.getElementById('dock');
        const launcher = document.getElementById('launcher');

        ind.addEventListener('touchstart', (e) => {
            this.state.touchY = e.touches[0].clientY;
            win.style.transition = 'none';
        });

        ind.addEventListener('touchmove', (e) => {
            this.state.deltaY = e.touches[0].clientY - this.state.touchY;
            if (this.state.deltaY > 0) {
                const progress = Math.min(this.state.deltaY / 750, 1);
                const scale = 1 - (progress * 0.18);
                const radius = progress * 60;
                
                win.style.transform = `translateY(${this.state.deltaY}px) scale(${scale})`;
                win.style.borderRadius = `${radius}px`;
                wall.style.filter = `blur(${30 * (1-progress)}px) brightness(${0.7 + (progress * 0.3)})`;
            }
        });

        ind.addEventListener('touchend', () => {
            win.style.transition = 'all 0.5s var(--hyper-bezier)';
            if (this.state.deltaY > 160) {
                this.closeApp(win, wall, dock, launcher);
            } else {
                win.style.transform = 'translateY(0) scale(1)';
                win.style.borderRadius = '0px';
            }
            this.state.deltaY = 0;
        });
    },

    closeApp(win, wall, dock, launcher) {
        win.classList.remove('open');
        win.style.transform = 'translateY(100%) scale(0.9)';
        win.style.borderRadius = '50px';
        wall.style.transform = 'scale(1)';
        wall.style.filter = 'blur(0px) brightness(1)';
        dock.style.transform = 'translateY(0)';
        launcher.style.transform = 'scale(1) opacity(1)';
    },

    clockHandler() {
        const tick = () => {
            const d = new Date();
            document.getElementById('clock-tick').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        };
        tick(); setInterval(tick, 1000);
    }
};

window.onload = () => Kernel.init();
</script>
</body>
</html>
