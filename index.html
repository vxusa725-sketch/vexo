<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKED BY VEXO</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; color: #0f0; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.7); }
        .ascii-skull { font-size: 8px; line-height: 8px; text-shadow: 0 0 12px #0f0; white-space: pre; animation: glitch 0.3s infinite; text-align: center; }
        .threat-text { font-size: 1.5rem; margin-top: 20px; text-align: center; font-weight: bold; color: #0f0; text-shadow: 0 0 20px red; direction: rtl; }
        @keyframes glitch { 0% { transform: skew(0.5deg); opacity: 1; } 50% { transform: skew(-0.5deg); opacity: 0.8; } 100% { transform: skew(0.5deg); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="overlay">
        <div class="ascii-skull">
      ______________________
     /                      \
    /   XXXX          XXXX   \
   |    XXXX          XXXX    |
   |    XXXX          XXXX    |
    \        XXXXXX          /
     \      XXXXXXXX        /
      \____________________/
             | |  | |
             | |  | |
        </div>
        <div class="threat-text">
            ⚠️ تـم اخـتراق هـاتفك بنـجاح ⚠️<br>
            سيتم إيقاف النظام بعد 3 أيام
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01VEXO7X98#$@%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
