<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXO SYSTEM FAILURE</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; color: #0f0; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.6); }
        
        /* الجمجمة المصنوعة بالأرقام والحروف */
        .ascii-skull { font-size: 10px; line-height: 10px; text-shadow: 0 0 10px #0f0; animation: skullShake 3s infinite; }
        
        /* نص التهديد */
        .threat-text { font-size: 1.8rem; margin-top: 30px; text-align: center; font-weight: bold; text-shadow: 0 0 15px #0f0; animation: threatBlink 1.5s infinite; direction: rtl; }
        
        @keyframes skullShake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        @keyframes threatBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    </style>
</head>
