<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperOS Smoothness Test</title>
    <style>
        :root {
            --ios-blur: blur(20px);
            --transition-speed: 0.5s;
            --ease: cubic-bezier(0.32, 0.72, 0, 1); /* منحنى حركة شاومي الشهير */
        }

        body {
            margin: 0;
            padding: 0;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية الأيقونات (Dock) */
        .dock {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            padding: 15px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
        }

        .icon:active { transform: scale(0.8); }

        /* نافذة التطبيق الوهمية */
        .app-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            height: 80%;
            background: white;
            border-radius: 40px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-speed) var(--ease);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .app-window.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #eee;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ألوان الأيقونات */
        .camera { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .phone { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .settings { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

    </style>
</head>
<body>

    <div class="app-window" id="app-screen">
        <h1 id="app-title">التطبيق</h1>
        <p>اختبار سلاسة HyperOS</p>
        <div class="close-btn" onclick="closeApp()">إغلاق (Swipe Down)</div>
    </div>

    <div class="dock">
        <div class="icon camera" onclick="openApp('الكاميرا', this)" title="1">📷</div>
        <div class="icon phone" onclick="openApp('الهاتف', this)" title="2">📞</div>
        <div class="icon settings" onclick="openApp('الإعدادات', this)" title="3">⚙️</div>
    </div>

    <script>
        let currentTimeout;

        function openApp(name, element) {
            const screen = document.getElementById('app-screen');
            const title = document.getElementById('app-title');
            
            // ميزة HyperOS: إذا كان هناك أنيميشن يعمل، يتم "تجاوزه" فورا (Interruptible)
            screen.classList.remove('active');
            
            // تأخير بسيط جداً لمحاكاة استجابة النظام (Response Time)
            setTimeout(() => {
                title.innerText = name;
                screen.classList.add('active');
                screen.style.backgroundColor = window.getComputedStyle(element).backgroundColor;
            }, 10);
        }

        function closeApp() {
            document.getElementById('app-screen').classList.remove('active');
        }

        // إغلاق عند الضغط على مفتاح Escape لمحاكاة زر الرجوع
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeApp();
        });
    </script>
</body>
</html>
